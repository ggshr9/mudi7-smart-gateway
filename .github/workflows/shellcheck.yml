name: shellcheck

on:
  push:
    branches: [master, main]
    paths:
      - '**.sh'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    paths:
      - '**.sh'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        env:
          # SC1091: don't fail when source'd file (e.g. /etc/mudi-vpn.conf) is
          # not present in the repo at lint time — it's created at runtime.
          SHELLCHECK_OPTS: -e SC1091 -S info
        with:
          severity: info
          scandir: .
