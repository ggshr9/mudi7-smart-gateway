# /etc/wireguard/wg0.conf — VPS-side WireGuard server.
# Mudi connects here for the screen-toggle state-machine trigger (its actual
# data path goes through mihomo + VLESS-REALITY, not this WG tunnel).
#
# ListenPort: pick a RANDOM HIGH PORT, not 51820 or 51234 — CN cellular CGNAT
# drops UDP return packets on well-known WG ports. See repo README for the
# whole story. The number below is just an example.

[Interface]
Address = 10.20.0.1/24
ListenPort = 39753
PrivateKey = REPLACE_WITH_SERVER_PRIVATE_KEY
SaveConfig = false

[Peer]
# Mudi 7 — the public key is generated by GL Web UI when you save the
# WireGuard Client profile. Paste it here and `wg syncconf wg0 <(wg-quick strip wg0)`.
PublicKey = REPLACE_WITH_MUDI_PUBLIC_KEY
AllowedIPs = 10.20.0.2/32
PersistentKeepalive = 0
